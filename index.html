<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Art de Mako - 1950s Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Special+Elite&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Kaikki mitat perustuvat % tai vw (viewport width) yksikköihin */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4ece1;
            font-family: 'Special Elite', typewriter, serif;
            color: #333;
            display: flex;
            justify-content: center;
        }

        /* Keskellä oleva taulukkomainen säiliö, joka skaalautuu */
        .main-container {
            width: 95%; 
            max-width: 1000px; /* Estää leviämästä liikaa isoilla näytöillä */
            background-color: #ffffff;
            box-shadow: 0 0 3vw rgba(0,0,0,0.1);
            min-height: 100vh;
        }

        /* Pääkuva ylhäällä - skaalautuu aina leveyden mukaan */
        .hero-image {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 0.8vw solid #5d8aa8;
        }

        .content {
            padding: 5%;
        }

        h1 {
            font-family: 'Lobster', cursive;
            text-align: center;
            color: #c0392b;
            font-size: clamp(24px, 6vw, 55px); /* Skaalautuva fontti */
            margin-bottom: 5vw;
            margin-top: 2vw;
        }

        /* Esittelyrivien asettelu */
        .art-row {
            display: flex;
            align-items: center;
            margin-bottom: 6vw;
            gap: 4%;
            border: none; /* Ei näkyviä taulukon osia */
        }

        .art-image {
            flex: 0 0 35%; /* Kuva vie aina 35% leveydestä */
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 1vw solid #fff;
            box-shadow: 0.5vw 0.5vw 1.5vw rgba(0,0,0,0.15);
            background-color: #eee;
        }

        .art-text {
            flex: 1;
        }

        .art-text h2 {
            font-family: 'Playfair Display', serif;
            margin-top: 0;
