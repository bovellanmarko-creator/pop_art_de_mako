<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taidegalleria - Skaalautuva 50-luku</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Special+Elite&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Perusasetukset */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4ece1;
            font-family: 'Special Elite', typewriter, serif;
            color: #333;
            display: flex;
            justify-content: center; /* Keskittää säiliön vaakasuunnassa */
        }

        /* Skaalautuva pääsäiliö */
        .main-container {
            width: 90%; /* Vie aina 90% näytön leveydestä */
            max-width: 1000px; /* Estää sivua leviämästä liian suureksi jättinäytöillä */
            background-color: #ffffff;
            box-shadow: 0 0 5vw rgba(0,0,0,0.1);
            min-height: 100vh;
        }

        /* Pääkuva skaalautuu automaattisesti */
        .hero-image {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 0.8vw solid #5d8aa8; /* Reunus skaalautuu näytön mukaan */
        }

        .content {
            padding: 4vw; /* Sisämarginaali skaalautuu */
        }

        h1 {
            font-family: 'Lobster', cursive;
            text-align: center;
            color: #c0392b;
            /* Fontin koko skaalautuu näytön leveyden mukaan (5% näytöstä) */
            font-size: clamp(24px, 5vw, 48px); 
            margin-bottom: 4vw;
        }

        /* Taulukkomainen rakenne ilman reunoja */
        .art-row {
            display: flex;
            align-items: center;
            margin-bottom: 5vw;
            gap: 3vw;
        }

        .art-image {
            /* Kuva vie aina 35% säiliön leveydestä ja pysyy neliönä */
            flex: 0 0 35%;
            aspect-ratio: 1 / 1; 
            object-fit: cover;
            border: 1vw solid #fff;
            box-shadow: 0.5vw 0.5vw 1.5vw rgba(0,0,0,0.2);
        }

        .art-text {
            flex: 1;
        }

        .art-text h2 {
            font-family: 'Playfair Display', serif;
            margin-top: 0;
            font-size: clamp(16px, 2.5vw, 28px);
            border-bottom: 0.2vw dashed #bdc3c7;
            padding-bottom: 1vw;
        }

        .art-text p {
            line-height: 1.6;
            font-size: clamp(12px, 1.5vw, 18px); /* Teksti pienenee suhteessa ruutuun */
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="kolme_nude_piisapa_lenskari.jpg" alt="Pääteos" class="hero-image">

        <div class="content">
            <h1>Modernia Väriä & Muotoa</h1>

            <div class="art-row">
                <img src="https://via.placeholder.com/300" alt="Teos 1" class="art-image">
                <div class="art-text">
                    <h2>Abstrakti Unelma</h2>
                    <p>Tämä teos edustaa aikakauden dynaamista otetta, jossa värit kohtaavat vapaan muodon.</p>
                </div>
            </div>

            <div class="art-row">
                <img src="https://via.placeholder.com/300" alt="Teos 2" class="art-image">
                <div class="art-text">
                    <h2>Urbaani Syke</h2>
                    <p>Katunäkymä, joka on suodatettu pop-taiteen esi-isien linssin läpi.</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
